<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유튜브 채널 모니터</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f0f;color:#f0f0f0;font-family:'Apple SD Gothic Neo',-apple-system,sans-serif;font-size:14px}
/* TOP */
.topbar{position:sticky;top:0;z-index:100;background:rgba(15,15,15,0.95);backdrop-filter:blur(10px);border-bottom:1px solid #222;padding:0 20px;display:flex;align-items:center;gap:10px;height:52px}
.logo{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;white-space:nowrap}
.dot{width:8px;height:8px;border-radius:50%;background:#ff4444;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.api-input{background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:5px 10px;color:#aaa;font-size:12px;width:200px;outline:none}
.api-input:focus{border-color:#444;color:#f0f0f0}
.btn{background:#1a1a1a;border:1px solid #444;border-radius:6px;color:#f0f0f0;font-size:12px;padding:6px 14px;cursor:pointer;white-space:nowrap}
.btn:hover{background:#252525}
.btn.red{background:#ff4444;border-color:#ff4444;color:#fff;font-weight:600}
.btn.red:hover{background:#e03333}
.updated{font-size:11px;color:#555;white-space:nowrap}
/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 52px)}
/* SIDEBAR */
.sidebar{width:180px;flex-shrink:0;border-right:1px solid #1e1e1e;padding:16px 0;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.sidebar-label{font-size:10px;font-weight:600;color:#444;letter-spacing:.08em;text-transform:uppercase;padding:0 14px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;cursor:pointer;color:#888;font-size:13px;border-left:2px solid transparent;transition:all .15s}
.nav-item:hover{color:#f0f0f0;background:#161616}
.nav-item.active{color:#f0f0f0;border-left-color:#ff4444;background:#161616}
.ndot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.nname{flex:1;margin-left:8px}
.nbadge{font-size:10px;background:#1e1e1e;color:#555;padding:1px 6px;border-radius:8px}
.nav-item.active .nbadge{background:rgba(255,68,68,.15);color:#ff4444}
/* STATS */
.content{flex:1;min-width:0}
.stats{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid #1e1e1e}
.stat{padding:14px 18px;border-right:1px solid #1e1e1e}
.stat:last-child{border-right:none}
.slabel{font-size:11px;color:#555;margin-bottom:4px}
.sval{font-size:22px;font-weight:600}
.ssub{font-size:11px;color:#555;margin-top:2px}
/* FEED */
.feed{padding:16px 20px}
.filter-row{display:flex;align-items:center;gap:6px;margin-bottom:14px}
.flabel{font-size:12px;color:#555}
.fbtn{font-size:12px;padding:4px 10px;border-radius:5px;border:1px solid #2a2a2a;background:transparent;color:#888;cursor:pointer;transition:all .15s}
.fbtn.active,.fbtn:hover{background:#1e1e1e;border-color:#333;color:#f0f0f0}
.sort{margin-left:auto;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:5px;color:#888;font-size:12px;padding:4px 8px;cursor:pointer;outline:none}
.ftitle{font-size:11px;font-weight:600;color:#444;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #1e1e1e}
/* PROGRESS */
.prog-wrap{margin-bottom:14px;display:none}
.prog-label{font-size:11px;color:#555;margin-bottom:6px}
.prog-bar{height:2px;background:#1e1e1e;border-radius:1px;overflow:hidden}
.prog-fill{height:100%;background:#ff4444;border-radius:1px;transition:width .3s;width:0}
/* VIDEO CARD */
.vcard{display:flex;gap:14px;padding:12px 14px;background:#161616;border-radius:8px;margin-bottom:4px;text-decoration:none;color:inherit;transition:background .1s}
.vcard:hover{background:#1c1c1c}
/* 채널 정보 - 왼쪽 고정 */
.vch{width:130px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:6px;padding-top:2px}
.vch img,.vch-ph{width:42px;height:42px;border-radius:50%;object-fit:cover;background:#2a2a2a;flex-shrink:0}
.vch-ph{display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:#666}

.vch-cat{font-size:10px;text-align:center}

.vmain{flex:1;min-width:0}

.vtitle a{color:inherit;text-decoration:none}

.vdesc.open{display:block;-webkit-line-clamp:unset}
.vmore{font-size:10px;color:#555;background:none;border:none;cursor:pointer;padding:2px 0;display:block;margin-top:3px}

.new-badge{display:inline-block;font-size:9px;font-weight:700;background:#ff4444;color:#fff;padding:1px 5px;border-radius:3px;margin-left:6px;vertical-align:middle}

.dot-시사{background:#fbbf24}.dot-엔터{background:#f472b6}.dot-교육{background:#2dd4bf}.dot-여행{background:#fb923c}
/* HOT */
.hot-badge{display:inline-block;font-size:9px;font-weight:700;background:#ff8c00;color:#fff;padding:1px 5px;border-radius:3px;margin-left:6px;vertical-align:middle}
.vcard.hot{border:1px solid rgba(255,140,0,0.3);background:#1a1500}
.vcard.hot:hover{background:#1e1900}
/* THUMB */
.vthumb{width:120px;aspect-ratio:16/9;object-fit:cover;border-radius:5px;display:block;background:#2a2a2a;flex-shrink:0}
.vtitle-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:5px}
.vtitle-row .vtitle{margin-bottom:0;flex:1;min-width:0}
/* EMPTY */
.empty{padding:50px 20px;text-align:center;color:#444;font-size:13px}
/* CHANNEL MANAGER */
.ch-mgr{border-top:1px solid #1e1e1e;padding:14px;margin-top:8px}
.ch-mgr-title{font-size:10px;font-weight:600;color:#444;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.ch-mgr-title button{font-size:10px;background:none;border:none;color:#555;cursor:pointer;padding:0}
.ch-mgr-title button:hover{color:#f0f0f0}
.ch-add-form{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.ch-input{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:5px;color:#ccc;font-size:11px;padding:5px 8px;outline:none;width:100%}

.ch-select{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:5px;color:#888;font-size:11px;padding:5px 8px;outline:none;width:100%;cursor:pointer}
.ch-add-btn{background:#ff4444;border:none;border-radius:5px;color:#fff;font-size:11px;font-weight:600;padding:6px;cursor:pointer;width:100%}
.ch-add-btn:hover{background:#e03333}
.ch-list{display:flex;flex-direction:column;gap:3px;max-height:200px;overflow-y:auto}
.ch-item{display:flex;align-items:center;justify-content:space-between;padding:5px 6px;background:#1a1a1a;border-radius:4px;font-size:11px;color:#888}
.ch-item-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.ch-del-btn{background:none;border:none;color:#444;cursor:pointer;font-size:12px;padding:0 2px;flex-shrink:0}

.ch-mgr-collapsed .ch-add-form,.ch-mgr-collapsed .ch-list{display:none}
</style>
</head>

];

let KEY='', videos=[], curCat='전체', curDate='yesterday', totalChannelCount=0;

// ── 구글 시트 연동 ──
const SHEET_ID = '16cEGwpmwIFdewzsAkfgl1ZCKZt48wQvRItWHdne6xME';
const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

// CSV 한 줄을 안전하게 파싱 (쉼표가 값 안에 있는 경우 대비)
function parseCsvLine(line){
  const result=[]; let cur=''; let inQuotes=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){ inQuotes=!inQuotes; continue; }
    if(c===','&&!inQuotes){ result.push(cur.trim()); cur=''; continue; }
    cur+=c;
  }
  result.push(cur.trim());
  return result;
}

async function fetchSheetChannels(){
  try{
    const res=await fetch(SHEET_CSV_URL);
    if(!res.ok) throw new Error('시트 응답 오류: '+res.status);
    const text=await res.text();
    const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
    if(!lines.length) return [];
    const header=parseCsvLine(lines[0]).map(h=>h.toLowerCase());
    const hIdx=header.indexOf('handle');
    const cIdx=header.indexOf('cat');
    const iIdx=header.indexOf('id');
    const channels=[];
    for(let i=1;i<lines.length;i++){
      const cols=parseCsvLine(lines[i]);
      const handle=hIdx>=0?cols[hIdx]:'';
      const id=iIdx>=0?cols[iIdx]:'';
      const cat=cIdx>=0?cols[cIdx]:'';
      if(!cat) continue;
      if(id) channels.push({id, cat});
      else if(handle) channels.push({handle, cat});
    }
    return channels;
  }catch(e){
    console.warn('구글 시트 불러오기 실패, 기본 채널만 사용:', e);
    return null; // null이면 시트 실패를 의미
  }
}

// localStorage에서 커스텀 채널 불러오기 (개인 추가분, 시트 실패 시 폴백용)
function loadCustomChannels(){
  try{ return JSON.parse(localStorage.getItem('yt_channels')||'[]'); }catch(e){ return []; }
}
function saveCustomChannels(arr){ localStorage.setItem('yt_channels', JSON.stringify(arr)); }

async function getChannels(){
  const sheetChannels=await fetchSheetChannels();
  if(sheetChannels===null){
    // 시트 실패 → 기본 채널 + 개인 로컬 추가분으로 폴백
    $('sheetStatus').textContent='⚠ 시트 연동 실패, 기본 목록 사용';
    return [...DEFAULT_CHANNELS, ...loadCustomChannels()];
  }
  $('sheetStatus').textContent=`✓ 공통 채널 ${sheetChannels.length}개 (구글 시트)`;
  return [...sheetChannels, ...loadCustomChannels()];
}

const $ = id => document.getElementById(id);

function fmtNum(n){
  if(!n) return '—';
  n=parseInt(n); if(isNaN(n)) return '—';
  if(n>=10000000) return (n/10000000).toFixed(1)+'천만';
  if(n>=10000) return Math.round(n/10000)+'만';
  if(n>=1000) return (n/1000).toFixed(1)+'K';
  return n.toLocaleString();
}
function fmtDate(iso){
  if(!iso) return '—';
  const d=new Date(iso), now=new Date(), diff=Math.floor((now-d)/1000);
  if(diff<3600) return Math.floor(diff/60)+'분 전';
  if(diff<86400) return Math.floor(diff/3600)+'시간 전';
  if(diff<172800) return '어제';
  if(diff<604800) return Math.floor(diff/86400)+'일 전';
  return d.toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'});
}
function isToday(iso){ if(!iso) return false; return new Date(iso).toDateString()===new Date().toDateString(); }
function isYday(iso){ if(!iso) return false; const y=new Date(); y.setDate(y.getDate()-1); return new Date(iso).toDateString()===y.toDateString(); }
function isWeek(iso){ return iso && (new Date()-new Date(iso))<7*86400000; }
function ck(cat){
  if(cat.includes('경제')) return '경제';
  if(cat.includes('IT')) return 'IT';
  if(cat.includes('과학')) return '과학';
  if(cat.includes('시사')) return '시사';
  if(cat.includes('엔터')) return '엔터';
  if(cat.includes('교육')) return '교육';
  return '여행';
}

function setCat(c){ curCat=c; document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.cat===c)); render(); }
function setDate(d){ curDate=d; document.querySelectorAll('.fbtn').forEach(el=>el.classList.toggle('active',el.dataset.d===d)); render(); }

function updateStats(){
  const tot=new Set(videos.map(v=>v.chName)).size;
  const tod=videos.filter(v=>isToday(v.pub));
  const yd=videos.filter(v=>isYday(v.pub));
  const wk=videos.filter(v=>isWeek(v.pub));
  $('s-total').textContent=totalChannelCount||tot;
  $('s-today').textContent=tod.length;
  $('s-today-sub').textContent=tod.length?[...new Set(tod.map(v=>v.chName))].slice(0,2).join(', ')+(tod.length>2?` 외 ${tod.length-2}개`:''):'없음';
  $('s-yday').textContent=yd.length;
  $('s-yday-sub').textContent=yd.length?`${yd.length}개 영상`:'없음';
  $('s-week').textContent=wk.length;

  const cats={'전체':videos.length};
  videos.forEach(v=>{ cats[v.cat]=(cats[v.cat]||0)+1; });
  [['전체','전체'],['경제/재테크','경제'],['IT/테크','IT'],['과학/공학','과학'],['시사/교양','시사'],['엔터/토크','엔터'],['교육','교육'],['여행/브이로그','여행']].forEach(([full,key])=>{
    const el=$(`n-${key}`); if(el) el.textContent=cats[full]||0;
  });
}

function render(){
  let list=[...videos];
  if(curCat!=='전체') list=list.filter(v=>v.cat===curCat);
  if(curDate==='today') list=list.filter(v=>isToday(v.pub));
  else if(curDate==='yesterday') list=list.filter(v=>isYday(v.pub));
  else if(curDate==='week') list=list.filter(v=>isWeek(v.pub));
  // 키워드 필터
  const kw=(document.getElementById('kwInput')?.value||'').trim().toLowerCase();
  if(kw) list=list.filter(v=>(v.title+v.desc).toLowerCase().includes(kw));
  const kwCount=document.getElementById('kwCount');
  if(kwCount) kwCount.textContent=kw?`${list.length}개 검색됨`:'';

  const sort=document.querySelector('.sort').value;
  if(sort==='date') list.sort((a,b)=>new Date(b.pub)-new Date(a.pub));
  else if(sort==='views') list.sort((a,b)=>(parseInt(b.views)||0)-(parseInt(a.views)||0));
  else if(sort==='likes') list.sort((a,b)=>(parseInt(b.likes)||0)-(parseInt(a.likes)||0));
  // 급상승: 최근 7일 영상 중 조회수 상위 10%
  const recentViews=list.filter(v=>isWeek(v.pub)).map(v=>parseInt(v.views)||0).sort((a,b)=>b-a);
  const hotThreshold=recentViews[Math.floor(recentViews.length*0.1)]||999999;

  const label=curDate==='today'?'오늘':curDate==='yesterday'?'어제':curDate==='week'?'이번 주':'전체';
  $('ftitle').textContent=`${list.length}개 영상 (${label})`;

  if(!list.length){ $('list').innerHTML='<div class="empty">해당 기간에 업로드된 영상이 없습니다</div>'; return; }

  // DOM으로 생성 (innerHTML 우회 → textContent 안전 삽입)
  const frag=document.createDocumentFragment();
  list.forEach((v,i)=>{
    const isHot=isWeek(v.pub)&&(parseInt(v.views)||0)>=hotThreshold&&hotThreshold>0;
    const card=document.createElement('div');
    card.className='vcard'+(isHot?' hot':'');
    card.style.cursor='pointer';
    card.onclick=()=>window.open(`https://www.youtube.com/watch?v=${v.vid}`,'_blank');

    // 채널 정보
    const vch=document.createElement('div');
    vch.className='vch';
    if(v.thumb){
      const img=document.createElement('img');
      img.src=v.thumb; img.alt='';
      img.onerror=()=>img.remove();
      vch.appendChild(img);
    } else {
      const ph=document.createElement('div');
      ph.className='vch-ph';
      ph.textContent=(v.chName||'?')[0];
      vch.appendChild(ph);
    }
    const nm=document.createElement('div'); nm.className='vch-name'; nm.textContent=v.chName; vch.appendChild(nm);
    const ct=document.createElement('div'); ct.className=`vch-cat cat-${ck(v.cat)}`; ct.textContent=v.cat; vch.appendChild(ct);

    // 영상 내용
    const vmain=document.createElement('div');
    vmain.className='vmain';

    // 썸네일 + 제목을 한 줄에 배치
    const titleRow=document.createElement('div');
    titleRow.className='vtitle-row';

    const thumbImg=document.createElement('img');
    thumbImg.className='vthumb';
    thumbImg.src=`https://i.ytimg.com/vi/${v.vid}/mqdefault.jpg`;
    thumbImg.alt='';
    thumbImg.onerror=()=>thumbImg.remove();
    titleRow.appendChild(thumbImg);

    const titleDiv=document.createElement('div');
    titleDiv.className='vtitle';
    const a=document.createElement('a');
    a.href=`https://www.youtube.com/watch?v=${v.vid}`;
    a.target='_blank';
    a.onclick=e=>e.stopPropagation();
    a.textContent=v.title;
    titleDiv.appendChild(a);
    if(isToday(v.pub)){ const b=document.createElement('span'); b.className='new-badge'; b.textContent='NEW'; titleDiv.appendChild(b); }
    if(isHot){ const h=document.createElement('span'); h.className='hot-badge'; h.textContent='🔥급상승'; titleDiv.appendChild(h); }
    titleRow.appendChild(titleDiv);
    vmain.appendChild(titleRow);

    const meta=document.createElement('div');
    meta.className='vmeta';
    [['👁 '+fmtNum(v.views)],['♥ '+fmtNum(v.likes)],[fmtDate(v.pub)]].forEach(([t])=>{
      const s=document.createElement('span'); s.textContent=t; meta.appendChild(s);
    });
    vmain.appendChild(meta);

    if(v.desc){
      const desc=document.createElement('div');
      desc.className='vdesc';
      desc.textContent=v.desc;
      vmain.appendChild(desc);
      if(v.desc.length>200){
        const more=document.createElement('button');
        more.className='vmore'; more.textContent='더 보기 ▾';
        more.onclick=e=>{ e.stopPropagation(); const open=desc.classList.toggle('open'); more.textContent=open?'접기 ▴':'더 보기 ▾'; };
        vmain.appendChild(more);
      }
    } else {
      const nd=document.createElement('div'); nd.style.cssText='font-size:11px;color:#444'; nd.textContent='소개글 없음';
      vmain.appendChild(nd);
    }

    card.appendChild(vch);
    card.appendChild(vmain);
    frag.appendChild(card);
  });

  $('list').innerHTML='';
  $('list').appendChild(frag);
}

async function api(url, timeoutMs=15000){
  const controller=new AbortController();
  const t=setTimeout(()=>controller.abort(), timeoutMs);
  try{
    const r=await fetch(url, {signal: controller.signal});
    return await r.json();
  }catch(e){
    console.warn('API 호출 실패/타임아웃:', url.slice(0,80), e.message);
    return {};
  }finally{
    clearTimeout(t);
  }
}

async function loadChannel(ch){
  const url=ch.id
    ?`https://www.googleapis.com/youtube/v3/channels?part=contentDetails,statistics,snippet&id=${ch.id}&key=${KEY}`
    :`https://www.googleapis.com/youtube/v3/channels?part=contentDetails,statistics,snippet&forHandle=${encodeURIComponent(ch.handle)}&key=${KEY}`;
  const d=await api(url);
  if(!d.items?.length) return;
  const info=d.items[0];
  const uploadsId=info.contentDetails?.relatedPlaylists?.uploads;
  if(!uploadsId) return;

  const pd=await api(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadsId}&maxResults=5&key=${KEY}`);
  if(!pd.items?.length) return;

  const vids=pd.items.map(item=>item.snippet?.resourceId?.videoId).filter(Boolean);
  if(!vids.length) return;
  const vd=await api(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${vids.join(',')}&key=${KEY}`);
  const detailMap={};
  (vd.items||[]).forEach(v=>{ detailMap[v.id]=v; });

  for(const vid of vids){
    const v=detailMap[vid];
    if(!v) continue;
    videos.push({
      vid, cat:ch.cat,
      chName:info.snippet?.title||'',
      thumb:info.snippet?.thumbnails?.default?.url||'',
      title:v.snippet?.title||'',
      desc:(v.snippet?.description||'').replace(/\n+/g,' ').trim(),
      pub:v.snippet?.publishedAt||'',
      views:v.statistics?.viewCount||'0',
      likes:v.statistics?.likeCount||'0'
    });
  }
}

async function startLoad(){
  KEY=document.getElementById('apiKey').value.trim();
  if(!KEY){ alert('API 키를 입력해주세요'); return; }
  // 키 localStorage에 저장
  localStorage.setItem('yt_api_key', KEY);
  document.getElementById('savedBadge').style.display = 'inline';
  videos=[];
  $('list').innerHTML='<div class="empty">불러오는 중...</div>';
  $('progWrap').style.display='block';
  document.querySelector('.btn.red').disabled=true;

  let done=0;
  const BATCH=6;
  const CHANNELS=await getChannels();
  totalChannelCount=CHANNELS.length;
  for(let i=0;i<CHANNELS.length;i+=BATCH){
    await Promise.all(CHANNELS.slice(i,i+BATCH).map(async ch=>{ try{ await loadChannel(ch); }catch(e){ console.warn('채널 로드 실패:', ch.handle||ch.id, e); } done++; }));
    $('progFill').style.width=Math.round(done/CHANNELS.length*100)+'%';
    $('progLabel').textContent=`불러오는 중... ${done}/${CHANNELS.length}`;
    updateStats(); render();
  }

  $('progWrap').style.display='none';
  document.querySelector('.btn.red').disabled=false;
  $('refreshBtn').style.display='inline-block';
  $('updated').textContent='업데이트: '+new Date().toLocaleString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  updateStats(); render();
}

// localStorage에서 저장된 키 불러오기
const savedKey = localStorage.getItem('yt_api_key');
if(savedKey){
  document.getElementById('apiKey').value = savedKey;
  document.getElementById('savedBadge').style.display = 'inline';
}
function clearKey(){
  localStorage.removeItem('yt_api_key');
  document.getElementById('apiKey').value='';
  document.getElementById('savedBadge').style.display='none';
}

function toggleChMgr(){
  const mgr=document.getElementById('chMgr');
  const btn=mgr.querySelector('.ch-mgr-title button');
  mgr.classList.toggle('ch-mgr-collapsed');
  btn.textContent=mgr.classList.contains('ch-mgr-collapsed')?'▼ 펼치기':'▲ 접기';
}

function parseHandle(input){
  input=input.trim();
  // URL에서 handle 추출
  const handleMatch=input.match(/@[\w.\-]+/);
  if(handleMatch) return {handle: handleMatch[0]};
  const idMatch=input.match(/channel\/(UC[\w-]+)/);
  if(idMatch) return {id: idMatch[1]};
  // 직접 @handle 또는 ID
  if(input.startsWith('@')) return {handle: input};
  if(input.startsWith('UC')) return {id: input};
  return {handle: '@'+input};
}

async function addChannel(){
  const urlVal=document.getElementById('chUrlInput').value.trim();
  const cat=document.getElementById('chCatInput').value;
  if(!urlVal){ alert('채널 URL 또는 핸들을 입력해주세요'); return; }
  const parsed=parseHandle(urlVal);
  const custom=loadCustomChannels();
  // 중복 체크
  const allCh=await getChannels();
  const dup=allCh.find(c=>(parsed.handle&&c.handle===parsed.handle)||(parsed.id&&c.id===parsed.id));
  if(dup){ alert('이미 추가된 채널이에요'); return; }
  custom.push({...parsed, cat});
  saveCustomChannels(custom);
  document.getElementById('chUrlInput').value='';
  renderChList();
  alert('채널이 추가됐어요! 새로고침을 눌러 데이터를 불러오세요.');
}

function deleteChannel(idx){
  const custom=loadCustomChannels();
  const ch=custom[idx];
  if(!confirm(`"${ch.handle||ch.id}" 채널을 삭제할까요?`)) return;
  custom.splice(idx,1);
  saveCustomChannels(custom);
  renderChList();
}

function renderChList(){
  const list=document.getElementById('chList');
  if(!list) return;
  const custom=loadCustomChannels();
  if(!custom.length){
    list.innerHTML='<div style="font-size:11px;color:#444;padding:4px 0">추가된 채널 없음</div>';
    return;
  }
  list.innerHTML='';
  custom.forEach((ch,i)=>{
    const item=document.createElement('div');
    item.className='ch-item';
    const name=document.createElement('span');
    name.className='ch-item-name';
    name.textContent=ch.handle||ch.id;
    const cat=document.createElement('span');
    cat.className=`ch-item-cat cat-${ck(ch.cat)}`;
    cat.textContent=ch.cat;
    const del=document.createElement('button');
    del.className='ch-del-btn';
    del.textContent='✕';
    del.onclick=()=>deleteChannel(i);
    item.appendChild(name); item.appendChild(cat); item.appendChild(del);
    list.appendChild(item);
  });
}

// 초기 렌더
renderChList();
</script>
